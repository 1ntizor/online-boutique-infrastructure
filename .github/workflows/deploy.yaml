name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  deploy:

    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Check Kubernetes Status
        run: |
          kubectl get nodes
          kubectl get pods -n online-boutique
          echo "GitHub Actions успешно выполнил команду прямо на мастере!"
