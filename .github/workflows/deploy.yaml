name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Run YAML Lint
        run: |
          echo "Checking Kubernetes manifests..."
          yamllint k8s-manifests/

      - name: Run Python Lint
        run: |
          echo "Checking Python scripts..."
          pip install --quiet flake8
          flake8 scripts/ --ignore=E501,E402,W503
      
      - name: Kubernetes Dry Run
        run: |
          echo "Validating manifests for Kubernetes..."
          for file in $(ls k8s-manifests/*.yaml | grep -v kustomization); do
            kubectl apply -f $file --dry-run=client
          done

      - name: Deploy to Cluster
        run: |
          echo "Applying changes to the cluster..."
          for file in $(ls k8s-manifests/*.yaml | grep -v kustomization); do
            kubectl apply -f $file
          done
