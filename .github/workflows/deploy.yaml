name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  test-connection:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Test SSH Connection
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: intizor
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            kubectl version --client
            echo "Connection successful!"
